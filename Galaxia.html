<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Galaxia del Amor</title>
    <style>
        body,
        html {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        .player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 2px solid #f60;
            border-radius: 999px;
            background: 0 0;
            box-shadow: 0 0 15px #f60, 0 0 30px #f30;
            z-index: 1000;
            font-family: Arial, sans-serif;
            color: #fff;
            font-size: 14px;
        }

        .player button {
            background: 0 0;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            filter: drop-shadow(0 0 6px #ff6600);
            transition: transform .2s;
        }

        .player button:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px #ff3300);
        }

        .progress {
            flex-grow: 1;
            height: 14px;
            background: rgba(255, 255, 255, .12);
            border-radius: 999px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(270deg, #f60, #f30, #f09, #f60);
            background-size: 400% 400%;
            border-radius: 999px;
            box-shadow: 0 0 10px #f60;
            animation: flowing 6s ease infinite;
        }

        @keyframes flowing {
            0% {
                background-position: 0 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0 50%;
            }
        }

        .time {
            min-width: 74px;
            text-align: right;
            font-size: 12px;
            color: #fff;
            text-shadow: 0 0 5px #f60;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    
    <div class="player">
        <button id="play">▶️</button>
        <div class="progress" id="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="time" id="time">0:00 / 0:00</div>
    </div>
    
    <audio id="audio" loop>
        <source 
            src="https://www.dropbox.com/scl/fi/qfv28rqu6b36jwusao4x4/Love.MP3?rlkey=ptjd053374f028aa4jfcfrfxn&st=1j0j51eo&raw=1" 
            type="audio/mpeg">
    </audio>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js"></script>
    
    <script>
        // ========== AUDIO PLAYER SETUP ==========
        const audio = document.getElementById("audio");
        const playBtn = document.getElementById("play");
        const progress = document.getElementById("progress");
        const progressBar = document.getElementById("progress-bar");
        const timeDisplay = document.getElementById("time");
        
        let isPlaying = false;

        function formatTime(seconds) {
            if (!isFinite(seconds)) return "0:00";
            return Math.floor(seconds / 60) + ":" + Math.floor(seconds % 60).toString().padStart(2, "0");
        }

        playBtn.addEventListener("click", async () => {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = "▶️";
            } else {
                await audio.play();
                playBtn.textContent = "⏸️";
            }
            isPlaying = !isPlaying;
        });

        audio.addEventListener("timeupdate", () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = (isFinite(percent) ? percent : 0) + "%";
            timeDisplay.textContent = formatTime(audio.currentTime) + " / " + formatTime(audio.duration);
        });

        progress.addEventListener("click", (e) => {
            const rect = progress.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (isFinite(audio.duration)) {
                audio.currentTime = percent * audio.duration;
            }
        });

        // ========== THREE.JS SCENE SETUP ==========
        const canvas = document.getElementById("c");
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(innerWidth, innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 5000);

        let targetDist = 300;
        let currentDist = 300;
        let rotX = 0.2;
        let rotY = 0;

        // ========== LOAD BACKGROUND TEXTURE ==========
        const loader = new THREE.TextureLoader();
        const nebulaTex = loader.load(
            "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/cube/space/px.jpg"
        );
        scene.background = nebulaTex;

        // ========== CREATE STAR FIELD ==========
        (function createStars(starCount = 2000, radius = 3000) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(3 * starCount);
            
            for (let i = 0; i < starCount; i++) {
                const distance = radius * (0.3 + 0.7 * Math.random());
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[3 * i + 0] = distance * Math.sin(phi) * Math.cos(theta);
                positions[3 * i + 1] = distance * Math.cos(phi);
                positions[3 * i + 2] = distance * Math.sin(phi) * Math.sin(theta);
            }
            
            geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
            scene.add(new THREE.Points(
                geometry,
                new THREE.PointsMaterial({
                    size: 1.5,
                    color: 0xffffff,
                    depthWrite: false
                })
            ));
        })();

        // ========== CREATE CORE SPHERE ==========
        const coreMat = new THREE.MeshPhongMaterial({
            color: 0x110f11,
            transparent: true,
            opacity: 0.6,
            shininess: 200
        });
        const core = new THREE.Mesh(new THREE.SphereGeometry(40, 64, 64), coreMat);

        function makeCenterTextTexture(text) {
            const canvas = document.createElement("canvas");
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext("2d");
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 80px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#ff0033";
            ctx.shadowColor = "#ff66aa";
            ctx.shadowBlur = 50;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            return new THREE.CanvasTexture(canvas);
        }

        scene.add(core);

        // ========== CREATE CENTER TEXT SPRITE ==========
        const centerTex = makeCenterTextTexture("TE AMO ❤️");
        const centerMat = new THREE.SpriteMaterial({ map: centerTex, transparent: true });
        const centerSprite = new THREE.Sprite(centerMat);

        // ========== CREATE GLOW ==========
        function makeGlow(size = 768, color1 = "255,160,0", color2 = "255,60,0") {
            const canvas = document.createElement("canvas");
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext("2d");
            const gradient = ctx.createRadialGradient(
                size / 2, size / 2, 0.05 * size,
                size / 2, size / 2, 0.5 * size
            );
            
            gradient.addColorStop(0, "rgba(" + color1 + ",0.9)");
            gradient.addColorStop(0.5, "rgba(" + color2 + ",0.5)");
            gradient.addColorStop(1, "rgba(0,0,0,0)");
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            return new THREE.CanvasTexture(canvas);
        }

        centerSprite.scale.set(60, 60, 1);
        centerSprite.position.set(0, 0, 0);
        centerSprite.renderOrder = 999;
        scene.add(centerSprite);

        const glow = new THREE.Sprite(
            new THREE.SpriteMaterial({
                map: makeGlow(),
                transparent: true,
                depthWrite: false
            })
        );

        // ========== CREATE RING TEXTURE ==========
        function ringTexture(size = 768) {
            const canvas = document.createElement("canvas");
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext("2d");
            ctx.translate(size / 2, size / 2);
            
            const innerRadius = 0.34 * size;
            const outerRadius = 0.49 * size;
            const gradient = ctx.createRadialGradient(0, 0, 0.3 * innerRadius, 0, 0, outerRadius);
            
            gradient.addColorStop(0, "rgba(255,255,200,1)");
            gradient.addColorStop(0.3, "rgba(255,160,60,0.9)");
            gradient.addColorStop(0.65, "rgba(255,80,0,0.6)");
            gradient.addColorStop(1, "rgba(0,0,0,0)");
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, outerRadius, 0, 2 * Math.PI);
            ctx.arc(0, 0, innerRadius, 0, 2 * Math.PI, true);
            ctx.closePath();
            ctx.fill();
            
            return new THREE.CanvasTexture(canvas);
        }

        glow.scale.set(500, 500, 1);
        scene.add(glow);

        // ========== CREATE RINGS ==========
        const ring1 = new THREE.Mesh(
            new THREE.RingGeometry(60, 80, 128),
            new THREE.MeshBasicMaterial({
                map: ringTexture(),
                transparent: true,
                side: THREE.DoubleSide
            })
        );

        const ring2 = new THREE.Mesh(
            new THREE.RingGeometry(85, 100, 128),
            new THREE.MeshBasicMaterial({
                map: ringTexture(),
                transparent: true,
                side: THREE.DoubleSide,
                opacity: 0.6
            })
        );

        ring1.rotation.x = ring2.rotation.x = Math.PI / 2;
        scene.add(ring1);
        scene.add(ring2);

        // ========== CREATE TEXT WORDS ==========
        const WORDS = [];
        const baseWords = [
            "🤟 Mi persona favorita", "🌤️ Mi paz contigo", "🗺️ Mi destino contigo", "⚡ Eres mi magia", "🫶 Te amo bonita",
            "🔭 Mi universo", "🧢 Mi reina", "🏅 Mi mayor logro", "☁️ Mi cielo", "📌 Mi punto fijo",
            "😂 Tu risa me encanta", "🌊 Contigo fluyo", "🔋 Me recargas", "🤝 Te elijo siempre", "😎 Me encantas así",
            "🤜🤛 Siempre juntos", "🫂 Abrazos eternos", "🍀 Mi buena suerte", "🔋 Mi energía bonita", "👥 Somos uno",
            "🐣 Mi ternura", "💡 Mi inspiración", "📍 Mi lugar seguro", "📸 Nuestros recuerdos", "🧘 Tu calma",
            "🌀 Me giras el mundo", "🏝️ Mi refugio", "🧠 Mi pensamiento favorito", "🍭 Dulzura pura", "🥤 Mi día feliz",
            "⚡ Mi chispa", "☀️ Mi sol", "⏳ Mi para siempre", "🚀 Mi futuro contigo",
            "🪄 Nuestra magia", "🎸 Nuestra canción", "☄️ Lo intenso de nosotros", "🧭 Mi dirección", "🏖️ Nuestro lugar",
            "☕ Mis mañanas contigo", "🌙 Mis noches contigo", "🕺 Nuestro ritmo", "🎯 Mi meta eres tú", "🖇️ Unidos siempre",
            "🧸 Mi amor", "🎰 Mi suerte eres tú", "🧬 Mi complemento perfecto", "TE AMO❤️"
        ];

        for (let i = 0; i < 6; i++) {
            WORDS.push(...baseWords);
        }

        function makeTextTexture(text, shadowColor) {
            const canvas = document.createElement("canvas");
            canvas.width = 512;
            canvas.height = 128;
            const ctx = canvas.getContext("2d");
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 60px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#fff";
            ctx.shadowColor = shadowColor;
            ctx.shadowBlur = 30;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            return new THREE.CanvasTexture(canvas);
        }

        const COLORS = [
            "#ff66ff", "#66ccff", "#ffd36b", "#ff9966", "#8df59a",
            "#ffa0f8", "#c6a7ff", "#ff4444", "#44ff99", "#99ccff"
        ];

        const textGroup = new THREE.Group();
        scene.add(textGroup);

        for (let i = 0; i < WORDS.length; i++) {
            const texture = makeTextTexture(WORDS[i], COLORS[i % COLORS.length]);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            
            sprite.scale.set(50, 16, 1);
            
            const phi = Math.acos(2 * Math.random() - 1);
            const theta = Math.random() * Math.PI * 2;
            const radius = 150 + 120 * Math.random();
            
            sprite.position.set(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
            
            sprite.userData = {
                phi: phi,
                theta: theta,
                radius: radius,
                speed: 0.001 + 0.001 * Math.random()
            };
            
            textGroup.add(sprite);
        }

        // ========== MOUSE & TOUCH CONTROLS ==========
        let dragging = false;
        let lastX = 0;
        let lastY = 0;

        function onDown(e) {
            dragging = true;
            const touch = e.touches ? e.touches[0] : e;
            lastX = touch.clientX;
            lastY = touch.clientY;
        }

        function onMove(e) {
            if (!dragging) return;
            
            const touch = e.touches ? e.touches[0] : e;
            const deltaX = (touch.clientX - lastX) / innerWidth;
            const deltaY = (touch.clientY - lastY) / innerHeight;
            
            rotY -= 3 * deltaX;
            rotX = Math.max(-1.2, Math.min(1.2, rotX - 2.2 * deltaY));
            
            lastX = touch.clientX;
            lastY = touch.clientY;
        }

        function onUp() {
            dragging = false;
        }

        addEventListener("mousedown", onDown);
        addEventListener("mousemove", onMove);
        addEventListener("mouseup", onUp);
        addEventListener("touchstart", onDown, { passive: true });
        addEventListener("touchmove", onMove, { passive: true });
        addEventListener("touchend", onUp, { passive: true });

        // ========== ZOOM CONTROLS ==========
        addEventListener("wheel", (e) => {
            targetDist += 0.25 * e.deltaY;
            targetDist = Math.max(160, Math.min(600, targetDist));
        }, { passive: true });

        let pinch = 0;
        addEventListener("touchmove", (e) => {
            if (e.touches && e.touches.length === 2) {
                e.preventDefault();
                
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const distance = Math.hypot(dx, dy);
                
                if (pinch) {
                    targetDist += 0.5 * (pinch - distance);
                    targetDist = Math.max(160, Math.min(600, targetDist));
                }
                pinch = distance;
            }
        }, { passive: false });

        addEventListener("touchend", () => {
            pinch = 0;
        }, { passive: true });

        // ========== ANIMATION LOOP ==========
        let time = 0;

        function tick() {
            requestAnimationFrame(tick);
            time += 0.01;

            // Rotate rings
            ring1.rotation.z += 0.002;
            ring2.rotation.z -= 0.0015;

            // Animate glow
            const glowScale = 500 * (1 + 0.03 * Math.sin(0.4 * time));
            glow.scale.set(glowScale, glowScale, 1);

            // Pulse core
            const coreScale = 1 + 0.05 * Math.sin(3 * time);
            core.scale.set(coreScale, coreScale, coreScale);

            // Animate text sprites
            textGroup.children.forEach((sprite) => {
                sprite.material.opacity = 0.8 + 0.2 * Math.sin(2 * time);
                sprite.userData.theta += sprite.userData.speed;
                
                sprite.position.x = sprite.userData.radius * Math.sin(sprite.userData.phi) * Math.cos(sprite.userData.theta);
                sprite.position.z = sprite.userData.radius * Math.sin(sprite.userData.phi) * Math.sin(sprite.userData.theta);
            });

            // Smooth camera zoom
            currentDist += 0.06 * (targetDist - currentDist);

            // Calculate camera position
            const cosRotX = Math.cos(rotX);
            const sinRotX = Math.sin(rotX);
            const cosRotY = Math.cos(rotY);
            const sinRotY = Math.sin(rotY);

            camera.position.set(
                currentDist * sinRotY * cosRotX,
                currentDist * sinRotX,
                currentDist * cosRotY * cosRotX
            );

            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
        }

        tick();
    </script>
